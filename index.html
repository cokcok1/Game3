<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABC 數字挑戰</title>
    <style>
        :root {
            --bg-color: #FFF0F5; /* 淺粉紅底 */
            --header-bg: #FFD1DC;
            --text-color: #5D5D5D;
            --btn-a: #FFB7B2; /* 粉紅 */
            --btn-b: #B2E2F2; /* 粉藍 */
            --btn-c: #FDFD96; /* 粉黃 */
        }

        body {
            margin: 0; padding: 0;
            font-family: "Arial Rounded MT Bold", sans-serif;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #header {
            background-color: var(--header-bg);
            padding: 15px; display: flex; justify-content: space-around;
            font-weight: bold; border-bottom: 5px solid #FFB6C1;
            font-size: 1.2rem; color: #666;
        }

        #question-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
        }

        #q-card {
            background: white; width: 85%; height: 50%;
            border-radius: 40px; display: flex;
            justify-content: center; align-items: center;
            font-size: 80px; font-weight: 900;
            color: var(--text-color);
            box-shadow: 0 12px 0px #E0E0E0;
            border: 8px solid #FFD1DC;
        }

        /* ABC 按鈕區 */
        #button-area {
            height: 35%;
            display: flex; justify-content: space-around;
            align-items: center;
            padding: 0 10px 80px 10px; /* 避開底部 Menu Bar */
        }

        .choice-btn {
            width: 100px; height: 100px;
            border-radius: 50%;
            font-size: 36px; font-weight: bold;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border: none; color: #444;
            cursor: pointer; transition: all 0.1s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-label { font-size: 18px; margin-bottom: 2px; color: #777; }
        .btn-val { font-size: 40px; font-weight: 900; }

        #btn-0 { background-color: var(--btn-a); box-shadow: 0 10px 0px #D69A96; }
        #btn-1 { background-color: var(--btn-b); box-shadow: 0 10px 0px #8AB6C4; }
        #btn-2 { background-color: var(--btn-c); box-shadow: 0 10px 0px #D1D17A; }

        .choice-btn:active { transform: translateY(6px); box-shadow: 0 4px 0px #AAA; }

        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <div style="background:white; padding:5px 15px; border-radius:20px;">題: <span id="count">1</span>/100</div>
        <div style="background:white; padding:5px 15px; border-radius:20px;">分: <span id="score">0</span></div>
    </div>
    
    <div id="question-container">
        <div id="q-card">15 + 2</div>
    </div>

    <div id="button-area">
        <button id="btn-0" class="choice-btn" onclick="checkAnswer(0)">
            <span class="btn-label">A</span>
            <span id="val-0" class="btn-val">?</span>
        </button>
        <button id="btn-1" class="choice-btn" onclick="checkAnswer(1)">
            <span class="btn-label">B</span>
            <span id="val-1" class="btn-val">?</span>
        </button>
        <button id="btn-2" class="choice-btn" onclick="checkAnswer(2)">
            <span class="btn-label">C</span>
            <span id="val-2" class="btn-val">?</span>
        </button>
    </div>

    <div id="flash"></div>

    <script>
        let currentIdx = 1, score = 0;
        let correctAnswerIdx = 0;
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-HK';
            utter.rate = 0.9;
            synth.speak(utter);
        }

        function generateOptions(correctVal) {
            let opts = [correctVal];
            while(opts.length < 3) {
                let offset = Math.floor(Math.random() * 5) + 1;
                let wrongVal = Math.random() > 0.5 ? correctVal + offset : correctVal - offset;
                if(wrongVal >= 0 && !opts.includes(wrongVal)) opts.push(wrongVal);
            }
            // 隨機打亂順序
            opts.sort(() => Math.random() - 0.5);
            return opts;
        }

        function nextQuestion() {
            if (currentIdx > 100) {
                document.getElementById('q-card').innerText = "完咗喇！";
                speak("練習完成，你好叻呀！");
                return;
            }

            document.getElementById('count').innerText = currentIdx;
            document.getElementById('score').innerText = score;

            // 隨機題目：兩位數 (10-20) 加/減 一位數 (1-9)
            const a = Math.floor(Math.random() * 11) + 10; // 10-20
            const b = Math.floor(Math.random() * 9) + 1;   // 1-9
            const isPlus = Math.random() > 0.5;
            const correctVal = isPlus ? (a + b) : (a - b);
            const opStr = isPlus ? "+" : "-";

            document.getElementById('q-card').innerText = `${a} ${opStr} ${b}`;
            speak(`${a} ${isPlus ? '加' : '減'} ${b} 等於幾多？`);

            // 生成選項
            const options = generateOptions(correctVal);
            correctAnswerIdx = options.indexOf(correctVal);

            for(let i=0; i<3; i++) {
                document.getElementById(`val-${i}`).innerText = options[i];
            }
        }

        function checkAnswer(idx) {
            const flash = document.getElementById('flash');
            if (idx === correctAnswerIdx) {
                score++;
                flash.style.backgroundColor = "rgba(162, 217, 161, 0.4)"; // 綠色回饋
            } else {
                flash.style.backgroundColor = "rgba(255, 154, 162, 0.4)"; // 紅色回饋
            }
            
            flash.style.display = 'block';
            setTimeout(() => {
                flash.style.display = 'none';
                currentIdx++;
                nextQuestion();
            }, 500);
        }

        window.onload = () => setTimeout(nextQuestion, 500);
    </script>
</body>
</html>
