<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kenneth & Ryan 咖啡大挑戰</title>
    <style>
        :root {
            --bg-color: #FFF0F5;
            --header-bg: #FFD1DC;
            --btn-a: #FFB7B2;
            --btn-b: #B2E2F2;
            --btn-c: #FDFD96;
        }

        body {
            margin: 0; padding: 0;
            font-family: "Arial Rounded MT Bold", sans-serif;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }

        #header {
            background-color: var(--header-bg);
            padding: 15px; display: flex; justify-content: space-around;
            font-weight: bold; border-bottom: 5px solid #FFB6C1;
            font-size: 1.1rem; color: #666;
        }

        .stat-box { background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        #question-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }

        #q-card {
            background: white; width: 85%; height: 50%;
            border-radius: 40px; display: flex; justify-content: center; align-items: center;
            font-size: 80px; font-weight: 900; color: #5D5D5D;
            box-shadow: 0 12px 0px #E0E0E0; border: 8px solid #FFD1DC;
        }

        #button-area {
            height: 35%; display: flex; justify-content: space-around;
            align-items: center; padding: 0 10px 80px 10px;
        }

        .choice-btn {
            width: 110px; height: 110px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: none; color: #444; cursor: pointer; transition: all 0.1s;
            position: relative; -webkit-tap-highlight-color: transparent;
        }

        .btn-val { font-size: 45px; font-weight: 900; }

        #btn-0 { background-color: var(--btn-a); box-shadow: 0 10px 0px #D69A96; }
        #btn-1 { background-color: var(--btn-b); box-shadow: 0 10px 0px #8AB6C4; }
        #btn-2 { background-color: var(--btn-c); box-shadow: 0 10px 0px #D1D17A; }

        .choice-btn:active { transform: translateY(6px); box-shadow: 0 4px 0px #AAA; }

        /* 版本號 */
        #version-tag {
            position: fixed; bottom: 10px; right: 15px;
            font-size: 12px; color: rgba(0,0,0,0.3);
            font-weight: normal; pointer-events: none;
        }

        /* 每 10 題跳出的提示框 */
        #hint-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            border: 10px solid #B2E2F2;
            padding: 40px; border-radius: 50px;
            text-align: center; z-index: 500;
            display: none; width: 75%;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
        }

        /* 50 題大獎勵畫面 */
        #reward-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #6F4E37; color: white;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        #reward-overlay h1 { font-size: 40px; margin: 20px; }
        #reward-overlay .coffee-icon { font-size: 150px; }
        #reward-overlay button {
            margin-top: 30px; padding: 15px 40px; font-size: 24px;
            border-radius: 30px; border: none; background: #FFF; color: #6F4E37; font-weight: bold;
        }

        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box">題數: <span id="count">0</span>/50</div>
        <div class="stat-box">總分: <span id="score">0</span></div>
    </div>
    
    <div id="question-container">
        <div id="q-card">-</div>
    </div>

    <div id="button-area">
        <button id="btn-0" class="choice-btn" onclick="checkAnswer(0)"><span id="val-0" class="btn-val">?</span></button>
        <button id="btn-1" class="choice-btn" onclick="checkAnswer(1)"><span id="val-1" class="btn-val">?</span></button>
        <button id="btn-2" class="choice-btn" onclick="checkAnswer(2)"><span id="val-2" class="btn-val">?</span></button>
    </div>

    <div id="version-tag">v1.5.0 (Coffee Edition)</div>

    <div id="hint-overlay">
        <div style="font-size: 100px;">🌟</div>
        <h2 id="hint-text" style="font-size: 36px; color: #444; line-height: 1.4;">加油！</h2>
    </div>

    <div id="reward-overlay">
        <div class="coffee-icon">☕</div>
        <h1>Kenneth 請 Ryan <br> 飲咖啡！</h1>
        <button onclick="resetGame()">再嚟過！</button>
    </div>

    <div id="flash"></div>

    <script>
        let currentIdx = parseInt(localStorage.getItem('kenneth_idx')) || 1;
        let score = parseInt(localStorage.getItem('kenneth_score')) || 0;
        let correctAnswerIdx = 0;
        const synth = window.speechSynthesis;

        function saveProgress() {
            localStorage.setItem('kenneth_idx', currentIdx);
            localStorage.setItem('kenneth_score', score);
        }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-HK';
            utter.rate = 0.9;
            synth.speak(utter);
        }

        function generateOptions(correctVal) {
            let opts = [correctVal];
            while(opts.length < 3) {
                let offset = Math.floor(Math.random() * 5) + 1;
                let wrongVal = Math.random() > 0.5 ? correctVal + offset : correctVal - offset;
                if(wrongVal >= 0 && !opts.includes(wrongVal)) opts.push(wrongVal);
            }
            opts.sort(() => Math.random() - 0.5);
            return opts;
        }

        function showHint(remain) {
            const hintBox = document.getElementById('hint-overlay');
            const hintText = document.getElementById('hint-text');
            hintText.innerText = `加油！\n仲有 ${remain} 題就有咖啡！`;
            hintBox.style.display = 'block';
            speak(`好叻呀！仲有 ${remain} 題就有免費咖啡飲喇！`);
            
            setTimeout(() => {
                hintBox.style.display = 'none';
                generateNext();
            }, 2500);
        }

        function nextQuestionLogic() {
            if ((currentIdx - 1) % 10 === 0 && currentIdx > 1 && currentIdx < 50) {
                showHint(50 - (currentIdx - 1));
            } else if (currentIdx > 50) {
                document.getElementById('reward-overlay').style.display = 'flex';
                speak("Kenneth 請 Ryan 飲咖啡！恭喜晒！");
            } else {
                generateNext();
            }
        }

        function generateNext() {
            document.getElementById('count').innerText = currentIdx;
            document.getElementById('score').innerText = score;

            const a = Math.floor(Math.random() * 11) + 10; 
            const b = Math.floor(Math.random() * 9) + 1;
            const isPlus = Math.random() > 0.5;
            const correctVal = isPlus ? (a + b) : (a - b);
            const opStr = isPlus ? "+" : "-";

            document.getElementById('q-card').innerText = `${a} ${opStr} ${b}`;
            speak(`${a} ${isPlus ? '加' : '減'} ${b} 等於幾多？`);

            const options = generateOptions(correctVal);
            correctAnswerIdx = options.indexOf(correctVal);

            for(let i=0; i<3; i++) {
                document.getElementById(`val-${i}`).innerText = options[i];
            }
        }

        function checkAnswer(idx) {
            const flash = document.getElementById('flash');
            if (idx === correctAnswerIdx) {
                score++;
                flash.style.backgroundColor = "rgba(162, 217, 161, 0.4)";
            } else {
                flash.style.backgroundColor = "rgba(255, 154, 162, 0.4)";
            }
            
            flash.style.display = 'block';
            setTimeout(() => {
                flash.style.display = 'none';
                currentIdx++;
                saveProgress();
                nextQuestionLogic();
            }, 500);
        }

        function resetGame() {
            currentIdx = 1;
            score = 0;
            saveProgress();
            document.getElementById('reward-overlay').style.display = 'none';
            generateNext();
        }

        window.onload = () => {
            if(currentIdx > 50) {
                document.getElementById('reward-overlay').style.display = 'flex';
            } else {
                generateNext();
            }
        };
    </script>
</body>
</html>
