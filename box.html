<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靜心方盒呼吸法</title>
    <style>
        :root {
            --primary-color: #64ffda;
            --bg-color: #0a192f;
            --text-color: #ccd6f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container { text-align: center; }

        /* 呼吸球動畫 */
        .circle-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }

        .circle {
            width: 150px;
            height: 150px;
            background: rgba(100, 255, 218, 0.2);
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            transition: all 4s linear; /* 與呼吸時間同步 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        /* 狀態標籤 */
        #status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            height: 2rem;
        }

        .controls button {
            padding: 10px 30px;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            cursor: pointer;
            transition: 0.3s;
        }

        .controls button:hover {
            background: rgba(100, 255, 218, 0.1);
        }

        /* 縮放動畫類 */
        .expand { transform: scale(1.8); }
        .shrink { transform: scale(1); }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="margin-bottom: 50px;">方盒呼吸法</h1>
        
        <div id="status">準備好了嗎？</div>

        <div class="circle-container">
            <div class="circle" id="circle">4</div>
        </div>

        <div class="controls">
            <button onclick="startBreathing()" id="startBtn">開始練習</button>
        </div>
    </div>

    <script>
        const circle = document.getElementById('circle');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        let step = 0;
        let timeLeft = 4;
        let timer = null;

        // 呼吸循環定義
        const phases = [
            { text: '吸氣 (Inhale)', scale: 'expand' },
            { text: '屏息 (Hold)', scale: 'expand' },
            { text: '呼氣 (Exhale)', scale: 'shrink' },
            { text: '屏息 (Hold)', scale: 'shrink' }
        ];

        function startBreathing() {
            startBtn.style.display = 'none';
            runCycle();
        }

        function runCycle() {
            const currentPhase = phases[step];
            statusText.innerText = currentPhase.text;
            circle.className = 'circle ' + currentPhase.scale;
            
            timeLeft = 4;
            updateCounter();

            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    updateCounter();
                } else {
                    clearInterval(timer);
                    step = (step + 1) % 4; // 進入下一階段
                    runCycle();
                }
            }, 1000);
        }

        function updateCounter() {
            circle.innerText = timeLeft;
        }
    </script>
</body>
</html>
